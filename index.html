<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fast-check@3.15.0/lib/bundle.js"></script>
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <h1>Productivity Dashboard</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>

        <!-- Top Section: Greeting and Timer -->
        <div class="top-section">
            <!-- Greeting Widget -->
            <div id="greetingWidget" class="greeting-widget">
                <div id="greetingMessage" class="greeting-message"></div>
                <div id="userName" class="user-name" contenteditable="true" placeholder="Click to add your name">Guest</div>
                <div id="currentTime" class="current-time"></div>
                <div id="currentDate" class="current-date"></div>
            </div>

            <!-- Focus Timer -->
            <div id="focusTimer" class="focus-timer">
                <h2>Focus Timer</h2>
                <div id="timerDisplay" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="startBtn" class="timer-btn">Start</button>
                    <button id="stopBtn" class="timer-btn" disabled>Stop</button>
                    <button id="resetBtn" class="timer-btn">Reset</button>
                </div>
            </div>
        </div>

        <!-- Bottom Section: Tasks and Quick Links -->
        <div class="bottom-section">
            <!-- Task List -->
            <div class="task-list-section">
                <div class="task-header">
                    <h2>My Tasks</h2>
                    <select id="sortTasks" class="sort-select">
                        <option value="date">Sort by Date</option>
                        <option value="status">Sort by Status</option>
                        <option value="name">Sort by Name</option>
                    </select>
                </div>
                <div class="input-section">
                    <input type="text" id="taskInput" placeholder="Add a new task..." />
                    <button id="addBtn">Add</button>
                </div>
                <ul id="taskList"></ul>
            </div>

            <!-- Quick Links -->
            <div id="quickLinks" class="quick-links">
                <h2>Quick Links</h2>
                <div class="quick-links-input">
                    <input type="text" id="linkNameInput" placeholder="Link name..." />
                    <input type="text" id="linkUrlInput" placeholder="URL..." />
                    <button id="addLinkBtn">Add Link</button>
                </div>
                <div id="linksList" class="links-list"></div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
